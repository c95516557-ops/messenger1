<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Chat</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
}
#messages{
border:1px solid #ccc;
height:300px;
overflow:auto;
padding:10px;
}
</style>
</head>

<body>

<h2>P2P Messenger</h2>

<div id="messages"></div>

<input id="message" placeholder="message">
<button onclick="sendMessage()">Send</button>

<br><br>

<button onclick="createOffer()">Create Chat</button>
<button onclick="joinChat()">Join Chat</button>

<textarea id="signal" placeholder="Signal data" style="width:100%;height:120px"></textarea>

<script>

let pc = new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let channel;

function log(msg){
const div=document.createElement("div");
div.textContent=msg;
document.getElementById("messages").appendChild(div);
}

function createOffer(){

channel=pc.createDataChannel("chat");

channel.onmessage=e=>log("Peer: "+e.data);

pc.onicecandidate=e=>{
if(!e.candidate){
document.getElementById("signal").value=
JSON.stringify(pc.localDescription);
}
};

pc.createOffer()
.then(o=>pc.setLocalDescription(o));

}

function joinChat(){

pc.ondatachannel=e=>{
channel=e.channel;
channel.onmessage=e=>log("Peer: "+e.data);
};

pc.onicecandidate=e=>{
if(!e.candidate){
document.getElementById("signal").value=
JSON.stringify(pc.localDescription);
}
};

let offer=JSON.parse(document.getElementById("signal").value);

pc.setRemoteDescription(offer)
.then(()=>pc.createAnswer())
.then(a=>pc.setLocalDescription(a));

}

function sendMessage(){

let msg=document.getElementById("message").value;

channel.send(msg);

log("You: "+msg);

document.getElementById("message").value="";

}

</script>

</body>
</html>
