<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body{
font-family: Arial;
background:#f0f0f0;
text-align:center;
}

#chat{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
text-align:left;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}
</style>

</head>
<body>

<div id="chat">

<h2>Chat</h2>

<div id="messages"></div>

<input id="message" placeholder="Введите сообщение">
<button id="send">Отправить</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC8nPvU7TrAm1OquvY1IHoOqqdHHbOumh4",
  authDomain: "messengerxam-c8ff6.firebaseapp.com",
  projectId: "messengerxam-c8ff6",
  storageBucket: "messengerxam-c8ff6.firebasestorage.app",
  messagingSenderId: "198724325087",
  appId: "1:198724325087:web:7212b654290d4f9295e36a",
  measurementId: "G-M4E9LK7E76"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("message");
const button = document.getElementById("send");
const messages = document.getElementById("messages");

button.onclick = () => {

if(input.value.trim() === "") return;

push(ref(db,"messages"),{
text:input.value
});

input.value="";

};

onChildAdded(ref(db,"messages"),(data)=>{

const div=document.createElement("div");
div.textContent=data.val().text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

});

</script>

</body>
</html>
